services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analyticore}
      POSTGRES_USER: ${POSTGRES_USER:-analyticore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyticore}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyticore} -d ${POSTGRES_DB:-analyticore}"]
      interval: 5s
      timeout: 3s
      retries: 10

  java-service:
    build: ./java-service
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-analyticore}
      POSTGRES_USER: ${POSTGRES_USER:-analyticore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyticore}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${JAVA_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-service:
    build: ./python-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-analyticore}:${POSTGRES_PASSWORD:-analyticore}@postgres:5432/${POSTGRES_DB:-analyticore}
      JAVA_SERVICE_URL: http://java-service:8080
      CORS_ORIGINS: http://localhost:3000
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      java-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      python-service:
        condition: service_healthy
    ports:
      - "3000:8080"

volumes:
  postgres-data:
