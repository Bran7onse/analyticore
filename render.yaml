databases:
  - name: analyticore-db
    databaseName: analyticore
    user: analyticore
    plan: free

services:
  - type: web
    name: analyticore-java
    runtime: docker
    rootDir: java-service
    healthCheckPath: /actuator/health
    envVars:
      - key: POSTGRES_HOST
        fromDatabase: {name: analyticore-db, property: host}
      - key: POSTGRES_PORT
        fromDatabase: {name: analyticore-db, property: port}
      - key: POSTGRES_DB
        fromDatabase: {name: analyticore-db, property: database}
      - key: POSTGRES_USER
        fromDatabase: {name: analyticore-db, property: user}
      - key: POSTGRES_PASSWORD
        fromDatabase: {name: analyticore-db, property: password}

  - type: web
    name: analyticore-python
    runtime: docker
    rootDir: python-service
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase: {name: analyticore-db, property: connectionString}
      - key: JAVA_SERVICE_URL
        fromService: {type: web, name: analyticore-java, property: hostport}
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: analyticore-frontend
    runtime: docker
    rootDir: frontend
    healthCheckPath: /health
    dockerCommand: nginx -g 'daemon off;'
    envVars:
      - key: VITE_API_URL
        sync: false
