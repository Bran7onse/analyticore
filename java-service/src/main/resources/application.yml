server:
  port: ${PORT:8080}
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:analyticore}
    username: ${POSTGRES_USER:analyticore}
    password: ${POSTGRES_PASSWORD:analyticore}
    hikari:
      maximum-pool-size: 10
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
